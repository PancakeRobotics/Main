<main>

  <div class="blurred-box text-center mb-5 px-4 py-4">

<script src="https://pancakerobotics.co.uk/assets/stylesheets/PageElements.js?"></script>

<script>
let allMembers = [];
let activeDepartmentFilters = new Set();
let searchTerm = "";

function getIconClass(platform) {
  const icons = {
    youtube: 'fab fa-youtube',
    twitter: 'fab fa-twitter',
    instagram: 'fab fa-instagram',
    linkedin: 'fab fa-linkedin',
    tiktok: 'fab fa-tiktok',
    github: 'fab fa-github',
    discord: 'fab fa-discord',
    film: 'fas fa-film',
    music: 'fas fa-music'
  };
  return icons[platform.toLowerCase()] || 'fas fa-link';
}

function getMemberDepartments(member) {
  const rawDepartments = member.departments || member.department;

  if (Array.isArray(rawDepartments)) {
    return rawDepartments.map(value => String(value).trim()).filter(Boolean);
  }

  if (typeof rawDepartments === 'string') {
    return rawDepartments
      .split(',')
      .map(value => value.trim())
      .filter(Boolean);
  }

  return [];
}

function getPrimaryDepartment(member) {
  const departments = getMemberDepartments(member);
  return departments[0] || member.department || 'Unassigned';
}

function getDepartmentColor(department) {
  const colorMap = {
    Dmnt_Management: '#ff5959',
    Dmnt_Documentation: '#ffb25c',
    Dmnt_Engineering: '#fffb5e',
    Dmnt_Communications: '#5fe869',
    Dmnt_Coding: '#4cc5fe',
    Dmnt_Design: '#b062c4',
    ExMember: '#616161',
    FoundingMember: '#616161'
  };

  return colorMap[department] || '#f783ac';
}

function makeDepartmentChip(name, count, isActive) {
  const displayName = name.replace(/^Dmnt_/, '');
  const color = getDepartmentColor(name);
  return `
    <button
      type="button"
      class="text-lg sm:text-xl transition ${isActive ? 'font-semibold underline underline-offset-4' : 'hover:opacity-90'}"
      style="color:${color};"
      data-department="${name}"
    >
      ${displayName} <span class="opacity-80">(${count})</span>
    </button>
  `;
}

function renderDepartmentFilters() {
  const panel = document.getElementById('departmentFilters');
  if (!panel) return;

  const counts = {};
  const allDepartments = [
    'Dmnt_Management',
    'Dmnt_Documentation',
    'Dmnt_Engineering',
    'Dmnt_Communications',
    'Dmnt_Coding',
    'Dmnt_Design',
    'ExMember',
    'FoundingMember'
  ];

  allDepartments.forEach(department => {
    counts[department] = 0;
  });

  allMembers.forEach(member => {
    const departments = getMemberDepartments(member);

    if (departments.length === 0) {
      counts.Unassigned = (counts.Unassigned || 0) + 1;
    } else {
      departments.forEach(department => {
        counts[department] = (counts[department] || 0) + 1;
      });
    }

    if (typeof member.name === 'string' && member.name.trim().startsWith('★')) {
      counts.FoundingMember = (counts.FoundingMember || 0) + 1;
    }
  });

  const sortedDepartments = allDepartments.filter(department => counts[department] !== undefined);
  const leftDepartments = sortedDepartments.filter(department => department !== 'ExMember' && department !== 'FoundingMember');
  const rightDepartments = sortedDepartments.filter(department => department === 'ExMember' || department === 'FoundingMember');

  panel.innerHTML = `
    <div class="flex flex-wrap items-center gap-2 w-full">
      <div class="flex flex-wrap items-center gap-2">
        ${leftDepartments.map(department => makeDepartmentChip(department, counts[department], activeDepartmentFilters.has(department))).join('')}
      </div>
      <div class="ml-auto flex flex-wrap items-center gap-2">
        ${rightDepartments.map(department => makeDepartmentChip(department, counts[department], activeDepartmentFilters.has(department))).join('')}
      </div>
    </div>
  `;

  panel.querySelectorAll('button[data-department]').forEach(button => {
    button.addEventListener('click', () => {
      const department = button.getAttribute('data-department');
      if (activeDepartmentFilters.has(department)) {
        activeDepartmentFilters.delete(department);
      } else {
        activeDepartmentFilters.add(department);
      }

      renderDepartmentFilters();
      renderMembers();
    });
  });
}

function getSearchTerms(term) {
  const normalizedTerm = term.replace(/[^a-z0-9]+/g, ' ').trim();
  return normalizedTerm ? normalizedTerm.split(/\s+/).filter(Boolean) : [];
}

function matchesSearch(member, searchTerms) {
  if (searchTerms.length === 0) return true;

  const haystack = [
    member.name,
    member.nicknames,
    member.role,
    member.description,
    member.department,
    member.from
  ].filter(Boolean).join(' ').toLowerCase();

  const normalizedHaystack = haystack.replace(/[^a-z0-9]+/g, ' ').trim();
  const haystackTerms = normalizedHaystack.split(/\s+/).filter(Boolean);

  return searchTerms.every(searchTermPart =>
    haystackTerms.some(haystackTerm => haystackTerm.includes(searchTermPart))
  );
}

function renderMembers() {
  const container = document.getElementById('members-container');
  const summary = document.getElementById('resultsSummary');
  if (!container) return;

  const visibleMembers = allMembers.filter(member => {
    const matchesSearchText = matchesSearch(member, getSearchTerms(searchTerm));
    const isFoundingMember = typeof member.name === 'string' && member.name.trim().startsWith('★');
    const memberDepartments = getMemberDepartments(member);
    const matchesDepartments = activeDepartmentFilters.size === 0 || [...activeDepartmentFilters].some(department => {
      if (department === 'FoundingMember') {
        return isFoundingMember;
      }
      return memberDepartments.includes(department) || (memberDepartments.length === 0 && department === 'Unassigned');
    });
    return matchesSearchText && matchesDepartments;
  });

  container.innerHTML = '';

  if (summary) {
    summary.textContent = `${visibleMembers.length} of ${allMembers.length} shown`;
  }

  if (visibleMembers.length === 0) {
    container.innerHTML = '<p class="text-gray-400 text-center py-8">No members matched your search.</p>';
    return;
  }

  visibleMembers.forEach(member => {
    const primaryDepartment = getPrimaryDepartment(member);
    const memberDepartments = getMemberDepartments(member);
    const isExMember = primaryDepartment === 'ExMember';
    const div = document.createElement('div');

    let nicknameHtml = '';
    const n = member.nicknames;
    if (Array.isArray(n)) {
      if (n.length >= 1) {
        nicknameHtml = `<span class="text-sm sm:text-base opacity-90 font-normal tracking-wide" style="color: rgba(255,255,255,0.9);">(${n[0]})</span>`;
      }
    } else if (typeof n === 'string' && n.trim()) {
      const parts = n.split(',').map(s => s.trim()).filter(Boolean);
      if (parts.length >= 1) {
        nicknameHtml = `<span class="text-sm sm:text-base opacity-90 font-normal tracking-wide" style="color: rgba(255,255,255,0.9);">(${parts[0]})</span>`;
      }
    }

    if (isExMember) {
      div.className = 'blurred-box mb-8 ExMember';
    } else {
      div.className = 'blurred-box mb-8';
    }

    const departmentText = memberDepartments.length > 0
      ? memberDepartments.map(dept => dept.replace(/^Dmnt_/, '')).join(', ')
      : 'Unassigned';

    div.innerHTML = `
      <div class="box-title2 ${isExMember ? 'ExMember' : primaryDepartment || ''}"><span>${member.name}</span>${nicknameHtml}</div>
      <div class="mt-4 flex flex-col sm:flex-row items-center gap-4">
        <img src="${member.avatar}" alt="${member.name}" class="rounded-lg object-cover flex-shrink-0" style="width: 180px; height: 180px;">
        <div class="flex-1 flex flex-col justify-center">
          <p class="text-gray-400 text-center">${member.description}</p>
          <p class="text-gray-400 text-center"><span class="role-label">Departments:</span> ${departmentText}</p>
          <p class="text-gray-400 text-center"><span class="role-label" style="color: ${getDepartmentColor(primaryDepartment)};">Role:</span> ${member.role || 'N/A'}</p>
          <p class="text-gray-400 text-center"><span class="from-label" style="color: ${getDepartmentColor(primaryDepartment)};">Member from:</span> ${member.from || 'N/A'}</p>
          <div class="mt-4 flex justify-center gap-4">
            ${Object.entries(member.social || {}).map(([platform, link]) => 
              `<a href="${link}" target="_blank" rel="noopener noreferrer" style="color: ${getDepartmentColor(primaryDepartment)};"><i class="${getIconClass(platform)} text-3xl"></i></a>`
            ).join('')}
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);

    const boxTitle = div.querySelector('.box-title2');
    const bgColor = getComputedStyle(boxTitle).backgroundColor;
    const roleLabel = div.querySelector('.role-label');
    if (roleLabel) roleLabel.style.color = bgColor;
    const fromLabel = div.querySelector('.from-label');
    if (fromLabel) fromLabel.style.color = bgColor;
    const nameLabel = div.querySelector('.name-label');
    if (nameLabel) nameLabel.style.color = bgColor;
  });
}

async function fetchMembers() {
  const url = `https://pancakerobotics.co.uk/assets/members.json?ts=${Date.now()}`;
  try {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    allMembers = await response.json();
    renderDepartmentFilters();
    renderMembers();
  } catch (error) {
    console.error('Error fetching members:', error);
    document.getElementById('members-container').innerHTML = '<p class="text-red-400">Failed to load members data. Please check the console for details.</p>';
  }
}

function setupMemberSearch() {
  const searchInput = document.getElementById('membersSearch');
  const clearButton = document.getElementById('clearFiltersBtn');

  if (searchInput) {
    searchInput.addEventListener('input', event => {
      searchTerm = event.target.value;
      renderMembers();
    });
  }

  if (clearButton) {
    clearButton.addEventListener('click', () => {
      searchTerm = '';
      activeDepartmentFilters.clear();
      if (searchInput) searchInput.value = '';
      renderDepartmentFilters();
      renderMembers();
    });
  }
}

setupMemberSearch();
fetchMembers();
</script>

<script>
  (function() {
    const root = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-toggle-icon');
    if (!toggleBtn || !icon) return;
    if (localStorage.getItem('theme') === 'light') {
      root.classList.add('light-mode');
      icon.classList.remove('fa-moon');
      icon.classList.add('fa-sun');
    }
    toggleBtn.addEventListener('click', function() {
      root.classList.toggle('light-mode');
      const isLight = root.classList.contains('light-mode');
      icon.classList.toggle('fa-moon', !isLight);
      icon.classList.toggle('fa-sun', isLight);
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
  })();

  (function() {
    const toggleBtn = document.getElementById('theme-toggle');
    function pokeSvg() {
      const honeySvg = document.getElementById('honeySvg');
      if (!honeySvg) return;
      const v = honeySvg.getAttribute('data-theme-poke') === '1' ? '0' : '1';
      honeySvg.setAttribute('data-theme-poke', v);
    }
    if (toggleBtn) {
      toggleBtn.addEventListener('click', function() {
        requestAnimationFrame(() => requestAnimationFrame(pokeSvg));
      });
    }
  })();
</script>

<script>
  document.addEventListener('click', function(e) {
    const navMenu = document.getElementById('navMenu');
    const navToggle = document.getElementById('navToggle');
    if (navMenu && navToggle && navMenu.classList.contains('active')) {
      if (!navMenu.contains(e.target) && !navToggle.contains(e.target)) {
        navMenu.classList.remove('active');
        navToggle.classList.remove('active');
      }
    }
  });
</script>
