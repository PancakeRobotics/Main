<style>

.overflow-x-auto { -webkit-overflow-scrolling: touch; }

#partsTable {
  table-layout: fixed;

}

#partsTable td { word-break: keep-all; }

#partsTable th:nth-child(1),

#partsTable th:nth-child(2),

#partsTable td:nth-child(3) .tag-cell {
  display: flex;

  gap: 0.25rem;

@media (max-width: 767px) {
  #partsTable {
    display: block;
    table-layout: auto;
    width: 100%;
  }

  #partsTable thead {
    display: none;
  }

  #partsTable tbody {
    display: block;
  }

  #partsTable tr {
    display: block;
    padding: 0.9rem 0.6rem;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    margin: 0 auto;
    width: calc(100% - 1.2rem);
    box-sizing: border-box;
    text-align: center;
  }

  #partsTable td {
    display: block;
    width: 100%;
    min-width: 0;
    max-width: none;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
    padding: 0.3rem 0;
    box-sizing: border-box;
    text-align: center;
  }

  #partsTable th:nth-child(1),
  #partsTable td:nth-child(1),
  #partsTable th:nth-child(2),
  #partsTable td:nth-child(2),
  #partsTable th:nth-child(3),
  #partsTable td:nth-child(3) {
    width: auto;
    min-width: 0;
    max-width: none;
  }

  #partsTable td:nth-child(3) .tag-cell {
    flex-wrap: wrap;
    overflow-x: visible;
    padding-bottom: 0;
    justify-content: center;
  }

  #partsTable td:nth-child(2) {
    opacity: 0.85;
    font-style: italic;
  }

<main>


<section id="search+filter" class="py-8 px-6">
    <div class="blurred-box text-center mb-5 px-4 py-4">
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <div class="box-title mb-0">Search + Filter</div>
      </div>

      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <label class="flex items-center gap-2 text-gray-200 MapleMonoFont text-2xl">
          <i class="fa-solid fa-magnifying-glass text-pink-300"></i>
          <input id="partsSearch" type="text" placeholder="Search parts" class="bg-transparent border-0 border-b border-pink-500/20 px-1 py-1 text-gray-50 placeholder:text-gray-400 focus:outline-none focus:border-pink-400/40" style="font-size: 22px; width: 300px;">
        </label>
      </div>

      <div id="tagFilters" class="mt-4 flex flex-wrap gap-2 text-xl"></div>
      <div class="mt-4 flex flex-wrap items-center gap-3">
        <div class="flex-1"></div>
        <div id="resultsSummary" class="text-xl text-gray-300 text-center flex-1"></div>
        <div class="flex-1 flex justify-end">
          <button id="clearFiltersBtn" type="button" class="text-base font-semibold text-pink-300 hover:text-pink-200 transition">
            Reset filters
          </button>
        </div>
      </div>
    </div>
</section>
    


<section  class="py-8 px-6">
  <div class="blurred-box text-center">
    <div class="box-title">Part Inventory</div>



    <div class="overflow-x-auto">
      <table id="partsTable" class="min-w-full text-left border-collapse MapleMonoFont">
        <thead class="text-pink-400 border-b border-pink-500/30">
          <tr>
            <th class="py-2 px-3">Part ID</th>
            <th class="py-2 px-3">Part Name</th>
            <th class="py-2 px-3">Tags</th>
          </tr>
        </thead>
        <tbody class="text-gray-50" id="partsBody" style="font-size: 18px;">


            <script>
            const CSV_URL = "https://pancakerobotics.co.uk/assets/parts.csv?10";
            let partsData = [];
            let activeTagFilters = new Set();
            let searchTerm = "";

            function stringToColor(str) {
              const palette = [
                "#ff6b6b", "#ff922b", "#fab005", "#40c057", "#2f9e44",
                "#0891b2", "#4c6ef5", "#845ef7", "#be4bdb", "#e64980",
                "#f783ac", "#96f2d7", "#63e6be", "#74c0fc", "#9775fa",
                "#ffa8a8", "#ffd43b", "#c0eb75"
              ];

              let hash = 0;
              for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
              }

              return palette[Math.abs(hash) % palette.length];
            }

            function makeTag(name) {
              const color = stringToColor(name);
              return `
                <button
                  type="button"
                  class="px-2.5 py-1 rounded-full text-black text-sm font-semibold mr-1 mb-1 border border-black/10 transition opacity-90"
                  style="background:${color};"
                  data-tag="${name}"
                >
                  ${name}
                </button>
              `;
            }

            function makeFilterChip(name, count, isActive) {
              const color = stringToColor(name);
              return `
                <button
                  type="button"
                  class="text-lg sm:text-xl transition ${isActive ? 'font-semibold underline underline-offset-4' : 'hover:opacity-90'}"
                  style="color:${color};"
                  data-tag="${name}"
                >
                  ${name} <span class="opacity-80">(${count})</span>
                </button>
              `;
            }

            function loadParts() {
              fetch(CSV_URL)
                .then(response => response.text())
                .then(text => {
                  const lines = text.trim().split("\n").filter(line => line.trim());
                  partsData = lines.map(line => {
                    const [id = "", name = "", altRaw = ""] = line.split(",");

                    const tags = altRaw
                      .split(/[,;]+/)
                      .map(s => s.trim())
                      .filter(s => s.length > 0);

                    return {
                      id: id.trim(),
                      name: name.trim(),
                      tags
                    };
                  });

                  renderFilters();
                  renderRows();
                })
                .catch(error => console.error("Error loading parts:", error));
            }

            function renderFilters() {
              const panel = document.getElementById("tagFilters");
              if (!panel) return;

              const counts = {};
              partsData.forEach(part => {
                part.tags.forEach(tag => {
                  counts[tag] = (counts[tag] || 0) + 1;
                });
              });

              const sortedTags = Object.keys(counts).sort((a, b) => a.localeCompare(b));

              panel.innerHTML = `
                ${sortedTags.map(tag => makeFilterChip(tag, counts[tag], activeTagFilters.has(tag))).join("")}
              `;

              panel.querySelectorAll("button[data-tag]").forEach(button => {
                button.addEventListener("click", () => {
                  const tag = button.getAttribute("data-tag");
                  if (activeTagFilters.has(tag)) {
                    activeTagFilters.delete(tag);
                  } else {
                    activeTagFilters.add(tag);
                  }

                  renderFilters();
                  renderRows();
                });
              });
            }

            function renderRows() {
              const tbody = document.getElementById("partsBody");
              if (!tbody) return;

              const term = searchTerm.trim().toLowerCase();
              const normalizedTerm = term.replace(/[^a-z0-9]+/g, " ").trim();
              const searchTerms = normalizedTerm ? normalizedTerm.split(/\s+/).filter(Boolean) : [];

              const visibleParts = partsData.filter(part => {
                const haystack = `${part.id} ${part.name} ${part.tags.join(" ")}`.toLowerCase();
                const normalizedHaystack = haystack.replace(/[^a-z0-9]+/g, " ").trim();
                const haystackTerms = normalizedHaystack.split(/\s+/).filter(Boolean);

                const matchesSearch = searchTerms.length === 0 || searchTerms.every(searchTermPart =>
                  haystackTerms.some(haystackTerm => haystackTerm.includes(searchTermPart))
                );

                const matchesTags = activeTagFilters.size === 0 || [...activeTagFilters].some(tag => part.tags.includes(tag));
                return matchesSearch && matchesTags;
              });

              tbody.innerHTML = "";

              if (visibleParts.length === 0) {
                tbody.innerHTML = `
                  <tr>
                    <td colspan="3" class="py-8 px-3 text-center text-gray-400">
                      No parts matched your search.
                    </td>
                  </tr>
                `;
              } else {
                visibleParts.forEach(part => {
                  const row = document.createElement("tr");
                  row.className = "hover:bg-white/5 transition";

                  row.innerHTML = `
                    <td class="py-2 px-3">${part.id}</td>
                    <td class="py-2 px-3">${part.name}</td>
                    <td class="py-2 px-3 align-top">
                      <div class="tag-cell">
                        ${part.tags.map(tag => makeTag(tag)).join(" ")}
                      </div>
                    </td>
                  `;

                  row.querySelectorAll("button[data-tag]").forEach(button => {
                    button.addEventListener("click", () => {
                      const tag = button.getAttribute("data-tag");
                      if (activeTagFilters.has(tag)) {
                        activeTagFilters.delete(tag);
                      } else {
                        activeTagFilters.add(tag);
                      }

                      renderFilters();
                      renderRows();
                    });
                  });

                  tbody.appendChild(row);
                });
              }

              updateSummary(visibleParts.length, partsData.length);
            }

            function updateSummary(count, total) {
              const summary = document.getElementById("resultsSummary");
              if (!summary) return;

              summary.innerHTML = `${count} of ${total} shown`;
            }

            document.addEventListener("DOMContentLoaded", () => {
              const searchInput = document.getElementById("partsSearch");
              const clearButton = document.getElementById("clearFiltersBtn");

              if (searchInput) {
                searchInput.addEventListener("input", event => {
                  searchTerm = event.target.value;
                  renderRows();
                });
              }

              if (clearButton) {
                clearButton.addEventListener("click", () => {
                  searchTerm = "";
                  activeTagFilters.clear();
                  if (searchInput) searchInput.value = "";
                  renderFilters();
                  renderRows();
                });
              }

              loadParts();
            });
          </script>
        </tbody>
      </table>
    </div>
  </div>
</section>

<script src="https://pancakerobotics.co.uk/assets/stylesheets/PageElements.js?3"></script>
<script>
  (function() {
  const root = document.documentElement;
  const toggleBtn = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-toggle-icon');
  if (localStorage.getItem('theme') === 'light') {
    root.classList.add('light-mode');
    icon.classList.remove('fa-moon');
    icon.classList.add('fa-sun');
  }
  toggleBtn.addEventListener('click', function() {
    root.classList.toggle('light-mode');
    const isLight = root.classList.contains('light-mode');
    icon.classList.toggle('fa-moon', !isLight);
    icon.classList.toggle('fa-sun', isLight);
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  });
})();

(function() {
  const toggleBtn = document.getElementById('theme-toggle');
  function pokeSvg() {
    const honeySvg = document.getElementById('honeySvg');
    if (!honeySvg) return;
    const v = honeySvg.getAttribute('data-theme-poke') === '1' ? '0' : '1';
    honeySvg.setAttribute('data-theme-poke', v);
  }

  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      requestAnimationFrame(() => requestAnimationFrame(pokeSvg));
    });
  }
})();
</script>

<script>
  document.addEventListener('click', function(e) {
    const navMenu = document.getElementById('navMenu');
    const navToggle = document.getElementById('navToggle');
    if (navMenu && navToggle && navMenu.classList.contains('active')) {
      if (!navMenu.contains(e.target) && !navToggle.contains(e.target)) {
        navMenu.classList.remove('active');
        navToggle.classList.remove('active');
      }
    }
  });
</script>
